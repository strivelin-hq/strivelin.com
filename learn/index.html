<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Theme Selector Anti-Flicker Script -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('strivelin_theme') || 'ultramarine';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Strivelin Learn — Master Skills, Track Progress</title>
  <meta name="description" content="Strivelin Learning Hub: Explore deep dives, tutorials, and summaries on tech, productivity, and systems. Join the discussion on each topic.">
  <meta name="author" content="Strivelin">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="learn.css">
</head>
<body>

  <!-- ========== Navigation ========== -->
  <nav class="nav" id="nav" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="/" class="nav-logo" aria-label="Strivelin home">
        <span class="gradient-text">Strivelin</span>
      </a>

      <ul class="nav-links" id="navLinks" role="menubar">
        <li role="none"><a href="/#products" class="nav-link" role="menuitem">Products</a></li>
        <li role="none"><a href="/blog/" class="nav-link" role="menuitem">Blog</a></li>
        <li role="none"><a href="/learn/" class="nav-link active" role="menuitem">Learn</a></li>
        <li role="none" style="display: flex; align-items: center;">
          <div class="theme-dropdown" id="themeDropdown">
            <button class="theme-dropdown-trigger" id="themeTrigger" aria-haspopup="true" aria-expanded="false" aria-label="Select color theme">
              <span>Theme</span>
              <svg class="dropdown-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="theme-dropdown-menu" role="menu">
              <button class="theme-menu-item" data-theme-btn="ultramarine" role="menuitem">
                <span class="theme-menu-dot dot-ultramarine"></span>
                Ultramarine
              </button>
              <button class="theme-menu-item" data-theme-btn="nordic" role="menuitem">
                <span class="theme-menu-dot dot-nordic"></span>
                Nordic Sage
              </button>
              <button class="theme-menu-item" data-theme-btn="amber" role="menuitem">
                <span class="theme-menu-dot dot-amber"></span>
                Obsidian Amber
              </button>
            </div>
          </div>
        </li>
        <li role="none" class="nav-cta">
          <a href="/learn/" class="btn btn-primary" role="menuitem">Get Started</a>
        </li>
      </ul>

      <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle navigation menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- ========== Learning Hub Container ========== -->
  <div class="learn-container">
    <div class="container learn-layout">
      
      <!-- Left Sidebar: Browse Topics & Chapters -->
      <aside class="learn-sidebar" id="learnSidebar" role="complementary" aria-label="Course outline">
        <h2 class="sidebar-title">Topics</h2>
        <nav class="topics-nav" id="topicsList">
          <!-- Populated by JavaScript -->
          <div class="sidebar-skeleton">
            <div class="skeleton-line shadow"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
          </div>
        </nav>
      </aside>

      <!-- Main Learning Content -->
      <main class="learn-main" id="learnMain">
        
        <!-- Breadcrumbs / Active Path Info -->
        <header class="content-header">
          <div class="breadcrumbs" id="breadcrumbs">
            <span class="crumb-topic">Loading...</span>
            <span class="crumb-separator">&rarr;</span>
            <span class="crumb-chapter">Loading...</span>
          </div>
          <h1 id="chapterTitle">Select a Topic to Start Learning</h1>
        </header>

        <div class="glass-card summary-card" id="summaryContent">
          <!-- Populated by JavaScript -->
        </div>
      </main>

    </div>
  </div>

  <!-- ========== Footer ========== -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <p class="footer-copy">&copy; 2026 Strivelin. All rights reserved.</p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="#" class="footer-link">Privacy Policy</a>
        <a href="#" class="footer-link">Terms of Service</a>
        <a href="/blog/" class="footer-link">Blog</a>
        <a href="/learn/" class="footer-link">Learn</a>
      </nav>
    </div>
  </footer>

  <!-- ========== Scripts ========== -->
  <script src="learn.js"></script>
  <script>
    // --- Mobile menu toggle ---
    const toggle = document.getElementById('mobileToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      const isOpen = links.classList.toggle('open');
      toggle.classList.toggle('active');
      toggle.setAttribute('aria-expanded', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    // --- Dynamic Theme Selector Controller ---
    const themeBtns = document.querySelectorAll('[data-theme-btn]');
    const themeDropdown = document.getElementById('themeDropdown');
    const themeTrigger = document.getElementById('themeTrigger');
    
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('strivelin_theme', theme);
      
      // Update active state on menu items
      themeBtns.forEach(btn => {
        const isActive = btn.getAttribute('data-theme-btn') === theme;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    // Initialize switcher active class
    const initialTheme = localStorage.getItem('strivelin_theme') || 'ultramarine';
    applyTheme(initialTheme);

    // Theme selector menu item clicks
    themeBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const theme = btn.getAttribute('data-theme-btn');
        applyTheme(theme);
        themeDropdown.classList.remove('open');
        themeTrigger.setAttribute('aria-expanded', 'false');
      });
    });

    // Click toggle (primarily for mobile/touch)
    themeTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = themeDropdown.classList.toggle('open');
      themeTrigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    // Close dropdown on clicking outside
    document.addEventListener('click', () => {
      themeDropdown.classList.remove('open');
      themeTrigger.setAttribute('aria-expanded', 'false');
    });
  </script>
</body>
</html>
